name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist

          for OS in darwin linux; do
            for ARCH in amd64 arm64; do
              NAME="society_${VERSION}_${OS}_${ARCH}"
              echo "Building ${NAME}..."
              GOOS=$OS GOARCH=$ARCH go build -ldflags "-s -w" -o "dist/society" ./cmd/society
              tar -czf "dist/${NAME}.tar.gz" -C dist society
              rm dist/society
            done
          done

          # ARM (linux only)
          NAME="society_${VERSION}_linux_arm"
          GOOS=linux GOARCH=arm GOARM=7 go build -ldflags "-s -w" -o "dist/society" ./cmd/society
          tar -czf "dist/${NAME}.tar.gz" -C dist society
          rm dist/society

          # Generate checksums
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
