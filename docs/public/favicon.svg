  <circle cx="64" cy="64" r="16" fill="#4A90D9"/>
  <!-- Agent nodes -->
  <circle cx="28" cy="28" r="10" fill="#6BBF6B"/>
  <circle cx="100" cy="28" r="10" fill="#E8A838"/>
  <circle cx="28" cy="100" r="10" fill="#C07DD6"/>
  <circle cx="100" cy="100" r="10" fill="#E06060"/>
  <!-- Connection lines -->
  <line x1="38" y1="38" x2="52" y2="52" stroke="#888" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="38" x2="76" y2="52" stroke="#888" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="90" x2="52" y2="76" stroke="#888" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="90" x2="76" y2="76" stroke="#888" stroke-width="3" stroke-linecap="round"/>
  <!-- S letter in center -->
  <text x="64" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="bold" font-size="24" fill="white">S</text>
  <style>
